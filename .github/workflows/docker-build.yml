name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the Docker image'
        required: true
        type: string
        default: 'latest'
  pull_request:
  push:
    branches:
      - main
      - runpod-serverless
    tags:
      - 'v*'

# Permissions for the reusable workflow jobs
permissions:
  contents: read
  packages: write
  pull-requests: write
  issues: write

jobs:
  # Cloud image - faster, used for PR deploys
  build-cloud:
    uses: ./.github/workflows/docker-build-image.yml
    with:
      variant: cloud
      suffix: '-cloud'
      dockerfile: Dockerfile.cloud
      description: Daydream Scope (Cloud)
    secrets: inherit

  # Standard image - slower, not needed for PR deploys
  build-standard:
    uses: ./.github/workflows/docker-build-image.yml
    with:
      variant: standard
      suffix: ''
      dockerfile: Dockerfile
      description: Daydream Scope
    secrets: inherit

  # PR deploy - only waits for cloud build
  deploy-pr:
    needs: build-cloud
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    outputs:
      livepeer_fal_app_id: ${{ steps.deploy_livepeer.outputs.livepeer_fal_app_id }}
      livepeer_fal_ws_url: ${{ steps.deploy_livepeer.outputs.livepeer_fal_ws_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install fal
        run: pip install fal

      - name: Deploy Livepeer runner to fal (PR environment)
        id: deploy_livepeer
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: |
          set -euo pipefail

          PR_NUMBER="${{ needs.build-cloud.outputs.pr_number }}"

          APP_NAME="scope-livepeer-pr-${PR_NUMBER}"

          echo "Deploying Livepeer runner for PR #${PR_NUMBER} to fal as ${APP_NAME}"

          fal deploy \
            --app-name "$APP_NAME" \
            --env preview \
            --auth private \
            src/scope/cloud/livepeer_fal_app.py 2>&1 | tee deploy_livepeer_output.txt

          LIVEPEER_FAL_APP_ID="daydream/${APP_NAME}--preview"
          LIVEPEER_FAL_WS_URL="wss://fal.run/${LIVEPEER_FAL_APP_ID}/ws"

          echo "livepeer_fal_app_id=${LIVEPEER_FAL_APP_ID}" >> $GITHUB_OUTPUT
          echo "livepeer_fal_ws_url=${LIVEPEER_FAL_WS_URL}" >> $GITHUB_OUTPUT

          echo "Deployed Livepeer runner to: ${LIVEPEER_FAL_APP_ID}"
          echo "Livepeer WebSocket URL: ${LIVEPEER_FAL_WS_URL}"

      - name: Comment on PR with deployment info
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ github.event.pull_request.number }};
            const livepeerFalAppId = '${{ steps.deploy_livepeer.outputs.livepeer_fal_app_id }}';
            const livepeerFalWsUrl = '${{ steps.deploy_livepeer.outputs.livepeer_fal_ws_url }}';
            const shortSha = '${{ needs.build-cloud.outputs.short_sha }}';

            const body = `## 🚀 fal.ai Preview Deployment

            | | |
            |---|---|
            | **Commit** | \`${shortSha}\` |
            | **App ID** | \`${livepeerFalAppId}\` |
            | **WebSocket** | \`${livepeerFalWsUrl}\` |

            ### Testing on Cloud
            \`\`\`
            SCOPE_CLOUD_APP_ID="${livepeerFalAppId}/ws" uv run daydream-scope
            \`\`\`

            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const existingComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('fal.ai Preview Deployment')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
            }

  # ---------------------------------------------------------------------------
  # Product-tests cloud smoke — runs AFTER deploy-pr so it can target the
  # PR's own freshly-deployed fal app. The rest of the product-tests suite
  # (machine-only scenarios, chaos, UI multimodal) lives in its own workflow
  # and runs in parallel; only the cloud-marked onboarding smoke needs the
  # deploy output, so only that step lives here.
  # ---------------------------------------------------------------------------
  product-tests-cloud-smoke:
    needs: deploy-pr
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Product Tests — cloud smoke
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          version: "0.9.11"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install product-tests deps
        run: uv sync --group product-tests

      - name: Install Playwright browser
        run: uv run playwright install --with-deps chromium

      - name: Run cloud smoke against PR-deployed fal app
        env:
          SCOPE_TEST_INSTRUMENTATION: "1"
          CUDA_VISIBLE_DEVICES: ""
          SCOPE_CLOUD_RING: "pr"
          # deploy-pr outputs `daydream/scope-livepeer-pr-<N>--preview`.
          # The runner expects the app_id with the `/ws` suffix appended.
          SCOPE_CLOUD_APP_ID: ${{ needs.deploy-pr.outputs.livepeer_fal_app_id }}/ws
        run: |
          uv run pytest product-tests/scenarios/test_onboarding_cloud.py \
            -v --tb=short -m cloud

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: product-tests-cloud-smoke-${{ github.run_id }}
          path: product-tests/reports/
          retention-days: 14
