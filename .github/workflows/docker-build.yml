name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the Docker image'
        required: true
        type: string
        default: 'latest'
  pull_request:
  push:
    branches:
      - main
      - runpod-serverless
    tags:
      - 'v*'

# Permissions for the reusable workflow jobs
permissions:
  contents: read
  packages: write
  pull-requests: write
  issues: write

jobs:
  # Cloud image - faster, used for PR deploys
  build-cloud:
    uses: ./.github/workflows/docker-build-image.yml
    with:
      variant: cloud
      suffix: '-cloud'
      dockerfile: Dockerfile.cloud
      description: Daydream Scope (Cloud)
    secrets: inherit

  # Standard image - slower, not needed for PR deploys
  build-standard:
    uses: ./.github/workflows/docker-build-image.yml
    with:
      variant: standard
      suffix: ''
      dockerfile: Dockerfile
      description: Daydream Scope
    secrets: inherit

  # PR deploy - only waits for cloud build
  deploy-pr:
    needs: build-cloud
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    outputs:
      fal_app_id: ${{ steps.deploy.outputs.fal_app_id }}
      fal_ws_url: ${{ steps.deploy.outputs.fal_ws_url }}
      livepeer_fal_app_id: ${{ steps.deploy_livepeer.outputs.livepeer_fal_app_id }}
      livepeer_fal_ws_url: ${{ steps.deploy_livepeer.outputs.livepeer_fal_ws_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install fal
        run: pip install fal

      - name: Deploy to fal (PR environment)
        id: deploy
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: |
          set -euo pipefail

          PR_NUMBER="${{ needs.build-cloud.outputs.pr_number }}"

          APP_NAME="scope-pr-${PR_NUMBER}"

          echo "Deploying PR #${PR_NUMBER} to fal as ${APP_NAME}"

          fal deploy \
            --app-name "$APP_NAME" \
            --env preview \
            --auth public \
            src/scope/cloud/fal_app.py 2>&1 | tee deploy_output.txt

          FAL_APP_ID="daydream/${APP_NAME}--preview"
          FAL_WS_URL="wss://fal.run/${FAL_APP_ID}/ws"

          echo "fal_app_id=${FAL_APP_ID}" >> $GITHUB_OUTPUT
          echo "fal_ws_url=${FAL_WS_URL}" >> $GITHUB_OUTPUT

          echo "Deployed to: ${FAL_APP_ID}"
          echo "WebSocket URL: ${FAL_WS_URL}"

      - name: Deploy Livepeer runner to fal (PR environment)
        id: deploy_livepeer
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: |
          set -euo pipefail

          PR_NUMBER="${{ needs.build-cloud.outputs.pr_number }}"

          APP_NAME="scope-livepeer-pr-${PR_NUMBER}"

          echo "Deploying Livepeer runner for PR #${PR_NUMBER} to fal as ${APP_NAME}"

          fal deploy \
            --app-name "$APP_NAME" \
            --env preview \
            --auth private \
            src/scope/cloud/livepeer_fal_app.py 2>&1 | tee deploy_livepeer_output.txt

          LIVEPEER_FAL_APP_ID="daydream/${APP_NAME}--preview"
          LIVEPEER_FAL_WS_URL="wss://fal.run/${LIVEPEER_FAL_APP_ID}/ws"

          echo "livepeer_fal_app_id=${LIVEPEER_FAL_APP_ID}" >> $GITHUB_OUTPUT
          echo "livepeer_fal_ws_url=${LIVEPEER_FAL_WS_URL}" >> $GITHUB_OUTPUT

          echo "Deployed Livepeer runner to: ${LIVEPEER_FAL_APP_ID}"
          echo "Livepeer WebSocket URL: ${LIVEPEER_FAL_WS_URL}"

      - name: Comment on PR with deployment info
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ github.event.pull_request.number }};
            const falAppId = '${{ steps.deploy.outputs.fal_app_id }}';
            const falWsUrl = '${{ steps.deploy.outputs.fal_ws_url }}';
            const livepeerFalAppId = '${{ steps.deploy_livepeer.outputs.livepeer_fal_app_id }}';
            const livepeerFalWsUrl = '${{ steps.deploy_livepeer.outputs.livepeer_fal_ws_url }}';
            const shortSha = '${{ needs.build-cloud.outputs.short_sha }}';

            const body = `## 🚀 fal.ai Preview Deployment

            | | |
            |---|---|
            | **App ID** | \`${falAppId}\` |
            | **WebSocket** | \`${falWsUrl}\` |
            | **Commit** | \`${shortSha}\` |

            ### Livepeer Runner

            | | |
            |---|---|
            | **App ID** | \`${livepeerFalAppId}\` |
            | **WebSocket** | \`${livepeerFalWsUrl}\` |
            | **Auth** | \`private\` |

            ### Testing
            Connect to this preview deployment by running this on your branch:
            \`\`\`
            uv run build && SCOPE_CLOUD_APP_ID="${falAppId}/ws" uv run daydream-scope
            \`\`\`

            Livepeer mode:
            \`\`\`
            SCOPE_CLOUD_MODE=livepeer SCOPE_CLOUD_APP_ID="${livepeerFalAppId}/ws" uv run daydream-scope
            \`\`\`

            🧪 E2E tests will run automatically against this deployment.
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const existingComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('fal.ai Preview Deployment')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
            }

  e2e-test:
    needs: deploy-pr
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E test dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Build Scope app
        env:
          VITE_DAYDREAM_API_KEY: ${{ secrets.E2ES_DAYDREAM_API_KEY }}
          VITE_DAYDREAM_AUTH_URL: https://app.daydream.live/sign-in/local
          VITE_DAYDREAM_API_BASE: https://api.daydream.live
        run: |
          echo "Building Scope with API key auth..."
          uv run build

      - name: Start Scope app
        env:
          SCOPE_CLOUD_APP_ID: ${{ needs.deploy-pr.outputs.fal_app_id }}
        run: |
          echo "Starting Scope with cloud app ID: $SCOPE_CLOUD_APP_ID"
          uv run daydream-scope > scope-app.log 2>&1 &

          echo "Waiting for localhost:8000 to be ready..."
          MAX_ATTEMPTS=60
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            if curl -s http://localhost:8000 > /dev/null 2>&1; then
              echo "App is ready at localhost:8000"
              break
            fi
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS - waiting..."
            sleep 2
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "App did not start in time"
            exit 1
          fi

      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-artifacts
          path: e2e/test-results/
          retention-days: 30

      - name: Upload app logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scope-app-logs
          path: scope-app.log
          retention-days: 30

      - name: Comment test results on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ github.event.pull_request.number }};
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const conclusion = '${{ job.status }}';

            const statusEmoji = conclusion === 'success' ? '✅' : '❌';
            const statusText = conclusion === 'success' ? 'passed' : 'failed';

            const body = `## ${statusEmoji} E2E Tests ${statusText}

            | | |
            |---|---|
            | **Status** | ${statusText} |
            | **fal App** | \`${{ needs.deploy-pr.outputs.fal_app_id }}\` |
            | **Run** | [View logs](${runUrl}) |

            ### Test Artifacts
            Check the workflow run for screenshots${conclusion !== 'success' ? ', traces, and failure details' : ''}.
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const existingComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('E2E Tests')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
            }
