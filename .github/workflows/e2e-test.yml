name: E2E Tests

on:
  workflow_run:
    workflows: ["Deploy PR to fal"]
    types:
      - completed

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    # Only run if the fal deployment succeeded
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Get deployment info
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            // Get the workflow run that triggered us
            const { data: triggeringRun } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id
            });
            
            // Get PR from head branch
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${triggeringRun.head_branch}`,
              state: 'open'
            });
            
            if (prs.length === 0) {
              core.setFailed('No open PR found');
              return;
            }
            
            const prNumber = prs[0].number;
            const falAppId = `scope-pr-${prNumber}`;
            
            core.setOutput('pr_number', prNumber);
            core.setOutput('head_sha', triggeringRun.head_sha);
            core.setOutput('fal_app_id', falAppId);
            
            console.log(`PR: #${prNumber}`);
            console.log(`fal App ID: ${falAppId}`);

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.deployment.outputs.head_sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        run: pip install uv

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E test dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Build Scope app
        env:
          VITE_DAYDREAM_API_KEY: ${{ secrets.DAYDREAM_API_KEY }}
        run: |
          echo "Building Scope with API key auth..."
          uv run build

      - name: Start Scope app
        env:
          SCOPE_CLOUD_APP_ID: ${{ steps.deployment.outputs.fal_app_id }}
        run: |
          echo "Starting Scope with cloud app ID: $SCOPE_CLOUD_APP_ID"
          uv run daydream-scope &
          
          # Wait for the app to be ready
          echo "Waiting for localhost:8000 to be ready..."
          MAX_ATTEMPTS=60
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            if curl -s http://localhost:8000 > /dev/null 2>&1; then
              echo "✅ App is ready at localhost:8000"
              break
            fi
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS - waiting..."
            sleep 2
          done
          
          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "❌ App did not start in time"
            exit 1
          fi

      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-pr-${{ steps.deployment.outputs.pr_number }}
          path: e2e/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-artifacts-pr-${{ steps.deployment.outputs.pr_number }}
          path: e2e/test-results/
          retention-days: 30

      - name: Comment test results on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.deployment.outputs.pr_number }};
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const conclusion = '${{ job.status }}';
            
            const statusEmoji = conclusion === 'success' ? '✅' : '❌';
            const statusText = conclusion === 'success' ? 'passed' : 'failed';
            
            const body = `## ${statusEmoji} E2E Tests ${statusText}
            
            | | |
            |---|---|
            | **Status** | ${statusText} |
            | **fal App** | \`${{ steps.deployment.outputs.fal_app_id }}\` |
            | **Run** | [View logs](${runUrl}) |
            
            ### Test Artifacts
            Check the workflow run for screenshots${conclusion !== 'success' ? ', traces, and failure details' : ''}.
            `;
            
            // Find and update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            
            const existingComment = comments.find(c => 
              c.user.type === 'Bot' && 
              c.body.includes('E2E Tests')
            );
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
            }
